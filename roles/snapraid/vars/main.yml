snapraid_install: true
# snapraid-runner always runs sync unconditionally as part of its pipeline (no
# config flag to skip it) - use the plain cron.yml path instead so sync and
# scrub can be scheduled independently, and sync can be dropped from cron.
snapraid_runner: false

snapraid_data_disks:
  - path: /data/seriale
    content: true
  - path: /data/filmy
    content: true
  - path: /data/video2
    content: true

snapraid_parity_disks:
  - path: /data/parity1
    name: parity1
    content: true
